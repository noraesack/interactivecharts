<html>
  <head>
    <script type="text/javascript" src="https://www.gstatic.com/charts/loader.js"></script>
    <script type="text/javascript">
      google.charts.load('current', {'packages':['timeline']});
      google.charts.setOnLoadCallback(drawChart);
      function drawChart() {
        var container = document.getElementById('timeline');
        var chart = new google.visualization.Timeline(container);
        var dataTable = new google.visualization.DataTable();
        

        dataTable.addColumn({ type: 'string', id: 'Blooming Season' });
        dataTable.addColumn({ type: 'string', id: 'Flower' });
        dataTable.addColumn({ type: 'date', id: 'Start' });
        dataTable.addColumn({ type: 'date', id: 'End' });

        dataTable.addRows([
          [ 'Spring', 'Tulips', new Date (2026, 2,1),  new Date (2026, 4,30)],
          [ 'Summer', 'Zinnias',  new Date (2026, 5,21),  new Date (2026, 6,10)],
          [ 'Fall', 'Mums', new Date (2026, 7,21),  new Date (2026, 9,4)],
      ])
        chart.draw(dataTable);
      }
    </script>
  </head>
  <body>
    <h2 style="font-family: Arial; text-align: center;">Seasonal Flower Timeline</h2>

    <div id="timeline" style="height: 180px;"></div>
  </body>
</html>
